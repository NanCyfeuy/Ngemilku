name: Minimal CI Pipeline - Laravel

on:
  push:
    branches: [ "main" ]

jobs:
  code-quality-and-test:

    runs-on: ubuntu-latest

    # 1. Definisi Layanan Database MySQL (jika pengujian Anda butuh database)
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: ngemilku
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - uses: actions/checkout@v4

    # 2. Setup PHP dan Dependencies
    - name: Setup PHP Environment
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.0'
        extensions: pdo_mysql, mbstring, dom
        tools: composer

    - name: Install Dependencies
      run: composer install --prefer-dist --no-interaction --no-progress

    - name: Prepare Application (Env, Key, Migrations)
      run: |
        cp .env.example .env
        php artisan key:generate
        
        # Tunggu MySQL siap sebelum migrasi
        while ! nc -z localhost 3306; do sleep 1; done
        
        # Jalankan Migrasi
        php artisan migrate --force
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: ngemilku
        DB_USERNAME: root
        DB_PASSWORD: password
    
    # 3. Menjalankan Linter (Pekerjaan Wajib #1)
    - name: Run Code Linter (PHP CS Fixer/Pint) 
      # Di sini kita asumsikan Anda menggunakan Laravel Pint atau PHP CS Fixer.
      # Pastikan package ini sudah ada di dev-dependencies (composer.json)
      run: ./vendor/bin/pint --test # Pint akan mengecek format tanpa mengubah file
      # Jika Anda menggunakan PHPStan (Static Analysis)
      # run: ./vendor/bin/phpstan analyse --level 5 src

    
    # 4. Menjalankan Unit Test (Pekerjaan Wajib #2)
    - name: Run Unit and Feature Tests (PHPUnit/Pest)
      env:
        APP_ENV: testing
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: ngemilku
        DB_USERNAME: root
        DB_PASSWORD: password
        SESSION_DRIVER: array
        CACHE_STORE: array
        QUEUE_CONNECTION: sync
      run: php artisan test
